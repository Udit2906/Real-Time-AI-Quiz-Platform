<!DOCTYPE html>
<html>
<head>
    <title>Live Quiz Dashboard</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .score { font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>
    <h1>👨‍🏫 Teacher Live Dashboard</h1>
    <p>Status: <span id="status">Connecting...</span></p>
    <div id="logs"></div>

    <script>
        const socket = io("http://localhost:4000");
        const quizId = "test-quiz-1"; // The quiz we are watching

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Connected! 🟢";
            // Tell the server we want to watch this specific quiz
            socket.emit("join_quiz", quizId);
        });

        // 🎯 The Magic Happens Here:
        socket.on("new_submission", (data) => {
            const logs = document.getElementById("logs");
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <strong>Student:</strong> ${data.studentId} <br>
                <strong>Result:</strong> <span class="score">${data.score}/${data.total}</span> <br>
                <small>Submitted at: ${new Date(data.submittedAt).toLocaleTimeString()}</small>
            `;
            logs.prepend(div); // Add new scores to the top
        });
    </script>
</body>
</html>
